<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bloom – Mental Health</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

    .phone {
      width: min(400px, 100%);
      margin: 0 auto;
      background: #FFF8F4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .status-bar {
      background: #f97c5a;
      padding: 10px 20px 8px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .status-bar span { font-size: 11px; color: white; font-weight: 500; }

    .screen { display: none; flex-direction: column; flex: 1; }
    .screen.active { display: flex; }

    .nav { display: flex; background: white; border-top: 0.5px solid #f0d9cc; padding: 8px 0 4px; }
    .nav button { flex: 1; background: none; border: none; cursor: pointer; padding: 4px 0; display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 10px; color: #a08070; }
    .nav button.active { color: #f97c5a; }
    .nav-icon { font-size: 18px; }

    .content { flex: 1; overflow-y: auto; padding: 16px; }

    .greeting { font-size: 20px; font-weight: 500; color: #3d2b1f; margin-bottom: 4px; }
    .sub { font-size: 13px; color: #a08070; margin-bottom: 16px; }

    .card { background: white; border-radius: 16px; padding: 14px 16px; margin-bottom: 12px; border: 0.5px solid #f0d9cc; }
    .card-title { font-size: 13px; font-weight: 500; color: #a08070; margin-bottom: 10px; letter-spacing: 0.02em; }

    .mood-row { display: flex; justify-content: space-between; }
    .mood-btn { background: none; border: 2px solid transparent; border-radius: 12px; padding: 6px 4px; cursor: pointer; text-align: center; flex: 1; }
    .mood-btn span { display: block; font-size: 22px; margin-bottom: 2px; }
    .mood-btn small { font-size: 10px; color: #a08070; }
    .mood-btn.selected { border-color: #f97c5a; background: #fff3ee; }

    .feature-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .feat-card { background: white; border-radius: 16px; padding: 14px 12px; border: 0.5px solid #f0d9cc; cursor: pointer; }
    .feat-icon { font-size: 24px; margin-bottom: 6px; }
    .feat-label { font-size: 12px; font-weight: 500; color: #3d2b1f; }
    .feat-desc { font-size: 11px; color: #a08070; margin-top: 2px; }

    .quote-card { background: linear-gradient(135deg, #f97c5a, #f4a97a); border-radius: 16px; padding: 16px; margin-bottom: 12px; }
    .quote-text { font-size: 14px; color: white; line-height: 1.5; font-style: italic; }
    .quote-author { font-size: 11px; color: rgba(255,255,255,0.8); margin-top: 8px; }
  </style>
</head>
<body>

<div class="phone">
  <div class="status-bar">
    <span>Bloom</span>
  </div>

  <div class="screen active" id="screen-home">
    <div class="content">
      <div class="greeting">Good morning 🌸</div>
      <div class="sub">How are you feeling today?</div>
      <div class="card">
        <div class="card-title">Today's mood check-in</div>
        <div class="mood-row">
          <button class="mood-btn"><span>😔</span><small>Low</small></button>
          <button class="mood-btn"><span>😐</span><small>Okay</small></button>
          <button class="mood-btn"><span>🙂</span><small>Good</small></button>
          <button class="mood-btn"><span>😊</span><small>Great</small></button>
          <button class="mood-btn"><span>🤩</span><small>Amazing</small></button>
        </div>
      </div>
      <div class="quote-card">
        <div class="quote-text">"You don't have to control your thoughts. You just have to stop letting them control you."</div>
        <div class="quote-author">— Dan Millman</div>
      </div>
      <div class="feature-grid">
        <div class="feat-card">
          <div class="feat-icon">🌬️</div>
          <div class="feat-label">Breathe</div>
          <div class="feat-desc">Guided breathing</div>
        </div>
        <div class="feat-card">
          <div class="feat-icon">📓</div>
          <div class="feat-label">Journal</div>
          <div class="feat-desc">Reflect & reframe</div>
        </div>
        <div class="feat-card">
          <div class="feat-icon">🌙</div>
          <div class="feat-label">Sleep</div>
          <div class="feat-desc">Wind-down tools</div>
        </div>
        <div class="feat-card">
          <div class="feat-icon">💬</div>
          <div class="feat-label">Get Help</div>
          <div class="feat-desc">Talk to a professional</div>
        </div>
      </div>
    </div>
    <div class="nav">
      <button class="active"><span class="nav-icon">🏠</span>Home</button>
      <button><span class="nav-icon">🌬️</span>Breathe</button>
      <button><span class="nav-icon">📓</span>Journal</button>
      <button><span class="nav-icon">🌙</span>Sleep</button>
      <button><span class="nav-icon">💬</span>Help</button>
    </div>
  </div>
</div>

</body>
</html>
